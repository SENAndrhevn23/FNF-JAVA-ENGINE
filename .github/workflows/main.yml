name: Build FNF JAVA ENGINE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3. Install FFmpeg (needed for rendering mode)
      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      # 4. Compile Java source files
      - name: Compile Java project
        run: |
          mkdir -p out
          javac -cp ".:gson-2.10.1.jar:json-20231013.jar" -d out \
            Main.java \
            Source/**/*.java \
            Source/*.java

      # 5. Package into runnable JAR
      - name: Build JAR
        run: |
          jar --create --file FNF-JAVA-ENGINE.jar -C out .

      # 6. Upload build artifact
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: FNF-JAVA-ENGINE
          path: FNF-JAVA-ENGINE.jar
